# -----------------------------------------------------------------------------
# Conda environment for the FaceAge GPU pipeline on NVIDIA DGX Spark
# (GB10 Grace-Blackwell, aarch64 / Linux, CUDA 13, compute capability SM 12.1)
#
# The original x86_64 / CUDA 11 / TensorFlow 2.6 stack does NOT run on this
# platform: conda-forge has no CUDA 13 aarch64 packages, and TF 2.6 cannot emit
# Blackwell (SM 12.1) kernels. GPU TensorFlow here relies on a community build
# of TensorFlow 2.21.0 compiled for aarch64 + CUDA 13, plus the SYSTEM-installed
# CUDA/cuDNN runtime (do NOT install CUDA via conda on this box).
#
# System prerequisites (install once, outside conda):
#   - NVIDIA driver + CUDA 13.0 runtime at /usr/local/cuda-13.0  (nvcc -V == 13.0)
#   - cuDNN 9.x for CUDA 13:   sudo apt-get install cudnn9-cuda-13
#   - Ensure the loader can find them, e.g.:
#       export LD_LIBRARY_PATH=/usr/local/cuda-13.0/lib64:$LD_LIBRARY_PATH
#
# Create with:  conda env create --file environment-gpu.yaml
# -----------------------------------------------------------------------------
name: faceage-gpu
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel
  - pip:
    # GPU TensorFlow built for DGX Spark (aarch64, CUDA 13.0.2, cuDNN 9.20, SM 12.1).
    # Match the wheel to the python version pinned above (cp311 -> python 3.11).
    - https://huggingface.co/Qanatpharma/tensorflow-2.21.0-cuda13-aarch64/resolve/main/tensorflow-2.21.0-cp311-cp311-linux_aarch64.whl
    # FaceAge pipeline dependencies (let pip resolve aarch64-compatible versions).
    - h5py
    - matplotlib
    - mtcnn
    - numpy
    - opencv-python
    - pandas
    - Pillow
    - pyyaml
    - scikit-image
    - seaborn
    - python-dateutil
